<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset='utf-8'>
    <meta http-equiv="X-UA-Compatible" content="chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="/favicon.ico?" type="image/x-icon" rel="icon" />
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    <script defer src="https://use.fontawesome.com/releases/v5.0.10/js/all.js" integrity="sha384-slN8GvtUJGnv6ca26v8EzVaR9DC58QEwsIk9q1QXdCU8Yu8ck/tL/5szYlBbqmS+" crossorigin="anonymous"></script>

{% seo %}
  </head>

  <body>

    <header>
      <div class="container">
        <a class="brand-logo" href="/"><img src="/assets/images/Codeling-64px.png" alt="Codeling" /></a>
        <h2>"{{ site.motto }}"</h2>
        <p class="author"><small>&#x2015; The Codeling</small></p>

        <div class="row">
          <div class="col-md-6 social-media social-media-header">
            <ul>
              {% for item in site.social_media %}
              <li><a href="{{ item.href }}"><i class="fab {{ item.fa_tag }}"></i></a></li>
              {% endfor %}
            </ul>
          </div>
          <div class="col-md-6 bottom-align social-media permalinks">
            <ul>
              <li><small><a href="/">home</a></small></li>
              <li><small><a href="/tags/">tags</a></small></li>
              <li><small><a href="/about/">about</a></small></li>
            </ul>
          </div>
        </div>
      </div>
    </header>

    <div class="container">
      <section id="main_content">
        {{ content }}
      </section>
    </div>

    {% if site.google_analytics %}
      <script type="text/javascript">
        (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
        (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
        m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
        })(window,document,'script','//www.google-analytics.com/analytics.js','ga');
        ga('create', '{{ site.google_analytics }}', 'auto');
        ga('send', 'pageview');
      </script>
    {% endif %}
  </body>
</html>
