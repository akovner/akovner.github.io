---
layout: default
---


<small>{{ page.date | date: "%-d %B %Y" }}</small>
<h1>{{ page.title }}</h1>

{{content}}
{% if page.tags %}
  <hr/>
  <div class="tags-expo-list">
    {% for tag in page.tags %}
    <a href="/tags#{{ tag | slugify }}" class="post-tag"><i class="fa fa-tag tag-space" aria-hidden="true"></i>{{ tag }}</a>
    {% endfor %}
  </div>
{% endif %}
